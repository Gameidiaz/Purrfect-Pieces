<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="globals.js"></script>
        <title>Purrfect Pieces</title>
    </head>
    <body>
        <div class="ui-container">
            <h1 class="logo" id="levelTitle">Level</h1>
            <button onclick="window.location.href=new URLSearchParams(location.search).get('custom')?'meowington.html':'play.html'">Puzzles</button>
            <button id="prevBtn" onclick="prevLevel()" style="display:none">&#8592; Prev</button>
            <button id="nextBtn" onclick="nextLevel()" style="display:none">Next &#8594;</button>
            <button onclick="shuffle()">Shuffle</button>
            <button onclick="undo()">Undo</button>
            <button onclick="replay()">Replay</button>
            <label>Size: <span id="gridLabel">3×3</span>
                <input type="range" id="gridSlider" min="2" max="6" value="3" oninput="changeGrid(this.value)">
            </label>
            <img id="refImage">
            <div id="board"></div>
            <p id="moveCount">Moves: 0</p>
            <p id="timerDisplay">Time: 0:00</p>
        </div>
        <script src="puzzle.js"></script>
        <audio id="puzzleMusic" src="audio/puzzled.mp3" loop></audio>
        <p id="musicHint" style="position:fixed;bottom:12px;left:0;right:0;text-align:center;font-size:13px;opacity:0.5;pointer-events:none;margin:0;">♪ click anywhere to start music</p>
        <script>
            const music = document.getElementById('puzzleMusic');
            const hint = document.getElementById('musicHint');
            music.volume = (localStorage.getItem('musicVolume') ?? 50) / 100;
            music.play().catch(() => {
                hint.style.display = 'block';
                document.addEventListener('click', () => {
                    music.play();
                    hint.style.display = 'none';
                }, { once: true });
            });
        </script>
    </body>
</html>
