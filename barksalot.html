<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="globals.js"></script>
        <title>Purrfect Pieces</title>
    </head>
    <body style="background-color: #b9d4ff; --bg-image: none;">
        <div class="ui-container">
            <h1 class="logo">Baron Von Barksalot's Emporium</h1>
            <img id="shopkeeper" src="images/barksalot.png" alt="Baron Von Barksalot" onclick="pokeShopkeeper()">
            <input type="text" id="promoInput" placeholder="enter promo code..." maxlength="32" oninput="this.value = this.value.toUpperCase()">
            <button onclick="redeemCode()">Redeem</button>
            <p id="promoMsg" class="logo" style="font-size: clamp(14px, 2vw, 22px); min-height: 1.5em; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 6px;"></p>
            <button onclick="smackTalk()">the competition...?</button>
            <button onclick="window.location.href='index.html'">go back</button>
        </div>
        <script>
            localStorage.setItem('visitedBarksalot', 'true');

            if (localStorage.getItem('visitedMeowington') === 'true') {
                setTimeout(() => {
                    const msg = document.getElementById('promoMsg');
                    const lines = [
                        "...I can smell Meowington on you.",
                        "you went to HIS shop first. BORK.",
                        "a TRAITOR walks into the Emporium. unbelievable.",
                        "...fine. the Baron is professional. he will serve you anyway. WOOF.",
                    ];
                    let i = 0;
                    const interval = setInterval(() => {
                        msg.textContent = lines[i];
                        i++;
                        if (i >= lines.length) {
                            clearInterval(interval);
                            setTimeout(() => msg.textContent = '', 2000);
                        }
                    }, 2000);
                }, 500);
            }

            if (localStorage.getItem('barksalotRageQuit') === 'true') {
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed; inset: 0; z-index: 99999;
                    background: #0a1020; display: flex;
                    justify-content: center; align-items: center;
                `;
                const flashMsg = document.createElement('p');
                flashMsg.style.cssText = `
                    color: #7eb8ff; font-family: Arial; font-weight: bold;
                    font-size: clamp(16px, 3vw, 28px); text-align: center;
                    padding: 20px; max-width: 80vw;
                `;
                overlay.appendChild(flashMsg);
                document.body.appendChild(overlay);

                const flashbacks = [
                    "...oh. you came back.",
                    "I may have overreacted. slightly.",
                    "it was very unprofessional and I acknowledge that.",
                    "please do not poke me again. I am a serious businessman.",
                    "...still friends? 🐕",
                ];

                let i = 0;
                const interval = setInterval(() => {
                    flashMsg.textContent = flashbacks[i];
                    i++;
                    if (i >= flashbacks.length) {
                        clearInterval(interval);
                        setTimeout(() => overlay.remove(), 800);
                        localStorage.removeItem('barksalotRageQuit');
                    }
                }, 3000);
            }

            let pokeCount = 0;
            const pokeMessages = [
                "HEY! WHO GAVE YOU PERMISSION TO TOUCH ME?! BORK!",
                "I SAID BACK OFF!! WOOF WOOF WOOF!!",
                "DO YOU WANT TO GET BOOPED?! BECAUSE THIS IS HOW YOU GET BOOPED!!",
                "BORK BORK BORK BORK BORK BORK BORK BORK!!!",
                "I AM CALLING MY LAWYER. HIS NAME IS BISCUIT AND HE IS VERY GOOD.",
                "THAT'S IT. I'M BITING THE COUCH. THE WHOLE COUCH. BECAUSE OF YOU.",
                "WOOOOOOOOOOOOF. I am so done. I am SO done.",
                "...fine. I'll just go lay down somewhere. Don't touch me. 😾",
            ];

            function pokeShopkeeper() {
                pokeCount++;
                if (pokeCount % 5 === 0) {
                    const stage = (pokeCount / 5) - 1;
                    if (stage >= pokeMessages.length - 1) {
                        document.getElementById('promoMsg').textContent = pokeMessages[pokeMessages.length - 1];
                        setTimeout(() => {
                            localStorage.setItem('barksalotRageQuit', 'true');
                            window.location.href = 'index.html';
                        }, 2000);
                        return;
                    }
                    document.getElementById('promoMsg').textContent = pokeMessages[stage];
                }
            }

            const codes = {
                "BARKSALOT": {
                    msg: "loading the shopkeeper as a puzzle... the Baron is flattered. BORK BORK.",
                    action: () => {
                        const imgSrc = document.getElementById('shopkeeper').src;
                        localStorage.setItem('activePuzzle', JSON.stringify({ img: imgSrc, name: "Baron Von Barksalot" }));
                        setTimeout(() => window.location.href = 'puzzle.html?custom=1', 800);
                    }
                },
            };

            const smackLines = [
                "Sir Meowington?? oh you mean the guy who HOGGED THE WHOLE GAME?? BORK!!",
                "yes fine I am an addon. AN ADDON WITH A BIG BEAUTIFUL BLUE BUTTON. WOOF.",
                "he speaks in baby talk and somehow HE gets to be the main character??",
                "I BUILT THIS EMPORIUM FROM NOTHING. he just had a head start. BORK.",
                "his shop has a FLASHING GIF BACKGROUND. I have TASTE. a solid color. elegant.",
                "I heard he rage quits if you poke him. I would NEVER. ...do not poke me. BORK.",
                "you know how you find HIS shop?? a tiny pink dot. in the corner. that NO ONE CAN SEE.",
                "I have a LABELED BUTTON on the MAIN MENU. in BLUE. very visible. very professional. BORK.",
            ];
            let smackIdx = 0;
            function smackTalk() {
                document.getElementById('promoMsg').textContent = smackLines[smackIdx % smackLines.length];
                smackIdx++;
            }

            function redeemCode() {
                const input = document.getElementById('promoInput').value.trim().toUpperCase();
                const msg = document.getElementById('promoMsg');

                if (!input) {
                    msg.textContent = "...type a code first. BORK.";
                    return;
                }

                if (codes[input]) {
                    msg.textContent = "✓ " + codes[input].msg;
                    if (codes[input].action) codes[input].action();
                } else {
                    msg.textContent = "Baron Von Barksalot does not recognize that code. BORK.";
                }
            }
        </script>
        <audio id="shoppeMusic" src="audio/shoppe.mp3" loop></audio>
        <p id="musicHint" style="position:fixed;bottom:12px;left:0;right:0;text-align:center;font-size:13px;opacity:0.5;pointer-events:none;margin:0;">♪ click anywhere to start music</p>
        <script>
            const music = document.getElementById('shoppeMusic');
            const hint = document.getElementById('musicHint');
            music.volume = (localStorage.getItem('musicVolume') ?? 50) / 100;
            music.play().catch(() => {
                hint.style.display = 'block';
                document.addEventListener('click', () => {
                    music.play();
                    hint.style.display = 'none';
                }, { once: true });
            });
        </script>
    </body>
</html>
