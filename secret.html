<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="globals.js"></script>
        <title>Purrfect Pieces</title>
    </head>
    <body style="background-image: url('images/shopkeeper-bg.png'); background-repeat: repeat; background-size: 100px; background-color: #ffb9cb;">
        <div class="ui-container">
            <h1 class="logo">Sir Meowington's Shoppe</h1>
            <img id="shopkeeper" src="images/shopkeeper.png" alt="Sir Meowington" onclick="pokeShopkeeper()">
            <input type="text" id="promoInput" placeholder="enter promo code..." maxlength="32">
            <button onclick="redeemCode()">Redeem</button>
            <p id="promoMsg" class="logo" style="font-size: clamp(14px, 2vw, 22px); min-height: 1.5em;"></p>
            <button onclick="window.location.href='index.html'">go back</button>
        </div>
        <script>
            if (localStorage.getItem('meowingtonRageQuit') === 'true') {
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed; inset: 0; z-index: 99999;
                    background: #1a0a10; display: flex;
                    justify-content: center; align-items: center;
                `;
                const flashMsg = document.createElement('p');
                flashMsg.style.cssText = `
                    color: #d95b7e; font-family: Arial; font-weight: bold;
                    font-size: clamp(16px, 3vw, 28px); text-align: center;
                    padding: 20px; max-width: 80vw;
                `;
                overlay.appendChild(flashMsg);
                document.body.appendChild(overlay);

                const flashbacks = [
                    "...oh. youre back.",
                    "wook i may have ovewweacted a wittle bit >_>",
                    "it was vewy unpwofessionaw of mwe and i appwogize",
                    "pwease dont poke mwe again tho. i am begging uwu",
                    "...siww fwiends? :3",
                ];

                let i = 0;
                const interval = setInterval(() => {
                    flashMsg.textContent = flashbacks[i];
                    i++;
                    if (i >= flashbacks.length) {
                        clearInterval(interval);
                        setTimeout(() => overlay.remove(), 800);
                        localStorage.removeItem('meowingtonRageQuit');
                    }
                }, 3000);
            }

            let pokeCount = 0;
            const pokeMessages = [
                "h-hey!! stawp poking mwe!! >w<",
                "im getting angwy >:3",
                "STAWP IT WIGHT NOW OW I WILL SCWEEM >:(",
                "YOU HAVE BEEN WAWNED!! SIW MEOWINGTON IS VEWY ANGWY!! >:O",
                "THATS IT!! IM CALLING THE PAWLICE!! >:(((",
                "YOU THINK THIS IS FUNNY?? IM TWEMBLING WITH WAGE RN >:(((((",
                "IM SO MAD I CANT EVEN UWUUUUU AAAAAAAA >:OOOOO",
                "...fine. do what you want. i dont cawe anymore. 😾",
            ];

            function pokeShopkeeper() {
                pokeCount++;
                if (pokeCount % 5 === 0) {
                    const stage = (pokeCount / 5) - 1;
                    if (stage >= pokeMessages.length - 1) {
                        document.getElementById('promoMsg').textContent = pokeMessages[pokeMessages.length - 1];
                        setTimeout(() => {
                            localStorage.removeItem('nyanUnlocked');
                            localStorage.setItem('meowingtonRageQuit', 'true');
                            window.location.href = 'index.html';
                        }, 2000);
                        return;
                    }
                    document.getElementById('promoMsg').textContent = pokeMessages[stage];
                }
            }

            const codes = {
                "NYAN": {
                    msg: "rainbow mode activated :3",
                    action: () => {
                        localStorage.setItem('nyanUnlocked', 'true');
                        startRainbowTrail();
                    }
                },
                "MEOWINGTON": {
                    msg: "loading sir meowington as a puzzle... :3",
                    action: () => {
                        const imgSrc = document.getElementById('shopkeeper').src;
                        localStorage.setItem('activePuzzle', JSON.stringify({ img: imgSrc, name: "Sir Meowington" }));
                        setTimeout(() => window.location.href = 'puzzle.html?custom=1', 800);
                    }
                }
            };

            function redeemCode() {
                const input = document.getElementById('promoInput').value.trim().toUpperCase();
                const msg = document.getElementById('promoMsg');

                if (!input) {
                    msg.textContent = "psst... type a code first";
                    return;
                }

                if (codes[input]) {
                    msg.textContent = "✓ " + codes[input].msg;
                    if (codes[input].action) codes[input].action();
                } else {
                    msg.textContent = "Sir Meowington does not recognize that code.";
                }
            }
        </script>
    </body>
</html>
