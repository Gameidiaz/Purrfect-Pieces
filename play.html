<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="globals.js"></script>
        <title>Purrfect Pieces</title>
    </head>
    <body>
        <div id="loadingScreen">
            <p id="loadingMsg"></p>
        </div>
        <script>
            const catMessages = [
                "Herding cats... please wait.",
                "Convincing cats to sit still...",
                "Bribing cats with treats...",
                "Untangling cat from keyboard...",
                "Cat knocked the images off the table. Picking them up...",
                "Waiting for cat to stop sitting on the server...",
                "Cat is judging you. Loading anyway...",
                "Searching couch cushions for missing puzzle pieces...",
                "Cat walked across the code. Fixing typos...",
                "Asking cat nicely to load the images. Still waiting.",
                "Cat said no. Loading anyway.",
                "3AM energy detected. Loading...",
                "Fur in the code. Debugging...",
                "Cat is sitting on the puzzle pieces. Negotiating...",
                "Downloading more cats...",
                "Cat stared at the loading bar. It got nervous and sped up.",
                "Pspspsps... come on images...",
                "Cat knocked the progress bar off the counter.",
                "Meowing at the files until they load.",
                "Cat has entered the room. Everything stops.",
                "Attempting to boop the server. Results pending.",
                "Cat is 11 inches long and absolutely in the way.",
                "Loading... or the cat is just blinking slowly at you.",
                "Cat tax being processed...",
                "One cat is helping. The other 12 are not.",
                "Why load fast when you can load at 3AM instead.",
                "Cat sat on the Wi-Fi router. This is fine.",
                "Calculating cuteness... overflow error.",
                "Cat has claimed this loading screen as its own.",
                "Files are shy. Coaxing them out from under the bed.",
                ":3",
            ];
            document.getElementById('loadingMsg').textContent =
                catMessages[Math.floor(Math.random() * catMessages.length)];
        </script>
        <div class="ui-container">
            <h1 class="logo">100 Puzzle Levels</h1>
            <button onclick="window.location.href='index.html'">Menu</button>
            <button onclick="window.location.href='custom.html'">Custom</button>
            <div class="puzzle-container">
            </div>
        </div>
        <script src="play.js"></script>
    </body>
</html>
